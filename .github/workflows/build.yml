name: Build, Test, and Package

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet Packages
        run: dotnet restore

      - name: Build Solution
        run: dotnet build --configuration Release --no-restore

      - name: Build MSI Installer
        run: dotnet build src/AndroidUsbAssistant.Installer/AndroidUsbAssistant.Installer.wixproj --configuration Release

      - name: Run Tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Upload Windows Installer MSI
        uses: actions/upload-artifact@v4
        with:
          name: AndroidUsbAssistantSetup-MSI
          path: src/AndroidUsbAssistant.Installer/bin/x64/Release/AndroidUsbAssistantSetup.msi
          if-no-files-found: error
