name: Build

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: windows-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore NuGet Packages
        run: dotnet restore ../../../AndroidUsbAssistant.slnx

      - name: Build Solution
        run: dotnet build ../../../AndroidUsbAssistant.slnx --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test ../../../AndroidUsbAssistant.slnx --configuration Release --no-build
